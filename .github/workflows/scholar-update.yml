name: Update Google Scholar Metrics

on:
  schedule:
    # Runs at 00:00 UTC on Sunday and Wednesday
    - cron: '0 0 * * 0,3'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scholarly

    - name: Run Scholar Scraper
      run: python scripts/update_scholar.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/scholar.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update Google Scholar metrics" && git push)
